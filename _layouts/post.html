<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} — StoicSoft Blog</title>
  <meta name="description" content="{{ page.description }}" />
  <meta name="keywords" content="{{ page.keywords }}" />
  <meta name="author" content="StoicSoft" />
  <link rel="canonical" href="{{ site.url }}{{ page.url }}" />

  <meta property="og:type" content="article" />
  <meta property="og:url" content="{{ site.url }}{{ page.url }}" />
  <meta property="og:title" content="{{ page.title }}" />
  <meta property="og:description" content="{{ page.description }}" />
  <meta property="og:site_name" content="StoicSoft" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ page.title }}" />
  <meta name="twitter:description" content="{{ page.description }}" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0c0c0e;
      --ink-soft: #18181c;
      --ink-border: #242428;
      --ink-muted: #3a3a40;
      --text: #e8e8ec;
      --text-muted: #8a8a96;
      --text-faint: #52525c;
      --accent: #c8a96e;
      --accent-soft: rgba(200, 169, 110, 0.12);
      --accent-border: rgba(200, 169, 110, 0.3);
      --blue: #5b9cf6;
      --blue-soft: rgba(91, 156, 246, 0.1);
      --green: #4ade80;
      --green-soft: rgba(74, 222, 128, 0.1);
      --r: 10px;
      --r-sm: 6px;
      font-size: 16px;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--ink);
      color: var(--text);
      font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(12,12,14,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--ink-border);
      padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px;
    }
    .nav-brand {
      font-size: 15px; font-weight: 600; letter-spacing: -0.01em;
      color: var(--text); display: flex; align-items: center; gap: 8px;
    }
    .nav-brand span { color: var(--accent); }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a { font-size: 13px; color: var(--text-muted); transition: color 0.15s; }
    .nav-links a:hover { color: var(--text); text-decoration: none; }

    .container { max-width: 760px; margin: 0 auto; padding: 0 2rem; }

    .post-header {
      padding: 5rem 0 2rem;
      border-bottom: 1px solid var(--ink-border);
      margin-bottom: 3rem;
    }
    .post-meta {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 1.25rem;
    }
    .post-category {
      display: inline-flex;
      background: var(--accent-soft); border: 1px solid var(--accent-border);
      color: var(--accent); font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 100px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .post-date { font-size: 13px; color: var(--text-faint); }
    .post-header h1 {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 700; letter-spacing: -0.03em;
      line-height: 1.15; margin-bottom: 1rem;
    }
    .post-header p {
      font-size: 1.1rem; color: var(--text-muted);
      line-height: 1.7; max-width: 600px;
    }

    .post-content { padding-bottom: 5rem; }
    .post-content h2 {
      font-size: 1.5rem; font-weight: 600;
      letter-spacing: -0.02em; margin: 2.5rem 0 1rem;
      color: var(--text);
    }
    .post-content h3 {
      font-size: 1.15rem; font-weight: 600;
      margin: 2rem 0 0.75rem; color: var(--text);
    }
    .post-content p {
      margin-bottom: 1.25rem; color: var(--text-muted);
      line-height: 1.8;
    }
    .post-content ul, .post-content ol {
      margin: 0 0 1.25rem 1.5rem; color: var(--text-muted);
      line-height: 1.8;
    }
    .post-content li { margin-bottom: 0.4rem; }
    .post-content strong { color: var(--text); font-weight: 600; }
    .post-content code {
      background: var(--ink-soft); border: 1px solid var(--ink-border);
      padding: 2px 6px; border-radius: 4px;
      font-size: 0.9em; color: var(--accent);
    }
    .post-content pre {
      background: var(--ink-soft); border: 1px solid var(--ink-border);
      border-radius: var(--r); padding: 1.25rem;
      overflow-x: auto; margin-bottom: 1.5rem;
    }
    .post-content pre code {
      background: none; border: none; padding: 0;
      font-size: 0.85rem; color: var(--text-muted);
    }
    .post-content blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.75rem 1.25rem;
      margin: 1.5rem 0;
      background: var(--accent-soft);
      border-radius: 0 var(--r-sm) var(--r-sm) 0;
    }
    .post-content blockquote p { color: var(--text); margin-bottom: 0; }

    .post-footer {
      border-top: 1px solid var(--ink-border);
      padding: 3rem 0;
      text-align: center;
    }
    .post-footer a {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent-soft); border: 1px solid var(--accent-border);
      color: var(--accent); font-size: 14px; font-weight: 500;
      padding: 10px 24px; border-radius: var(--r);
      transition: all 0.15s;
    }
    .post-footer a:hover { background: var(--accent-border); text-decoration: none; }

    footer {
      border-top: 1px solid var(--ink-border);
      padding: 2rem;
      text-align: center;
      font-size: 13px;
      color: var(--text-faint);
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">Stoic<span>Soft</span></a>
  <div class="nav-links">
    <a href="/#products">Products</a>
    <a href="/blog/">Blog</a>
    <a href="/#about">About</a>
  </div>
</nav>

<div class="container">
  <header class="post-header">
    <div class="post-meta">
      <span class="post-category">{{ page.category }}</span>
      <span class="post-date">{{ page.date | date: "%B %-d, %Y" }}</span>
    </div>
    <h1>{{ page.title }}</h1>
    <p>{{ page.description }}</p>
  </header>

  <article class="post-content">
    {{ content }}
  </article>

  <div class="post-footer">
    <a href="/blog/">← Back to all posts</a>
  </div>
</div>

<footer>
  &copy; {{ site.time | date: "%Y" }} StoicSoft. All rights reserved.
</footer>

</body>
</html>
